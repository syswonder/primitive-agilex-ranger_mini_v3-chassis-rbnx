# AgileX Ranger Mini chassis primitive.
#
# Wraps the upstream `ranger_ros2` (vendored under src/ranger_ros2)
# which talks to the Ranger Mini's CAN bus via `ugv_sdk` (vendored
# under src/ugv_sdk). On the Jetson the CAN interface is `can_ranger`
# (renamed from can0 by udev — see /etc/systemd/network/* on the
# robot) so it's stable across reboots.
#
# Owns the `primitive/chassis/*` namespace.
#
# Lifecycle: start.sh launches the atlas bridge ONLY (no ROS spawn).
# `rbnx boot` then calls `Driver(CMD_INIT, config_json)` — the handler
# spawns `ros2 launch ranger_bringup ranger_mini_v2.launch.xml`, waits
# for the first /odom message, and only THEN declares the data
# interfaces on atlas.
#
# Capability surface (mode = abstract pattern, transport = wire):
#   primitive/chassis/driver    mode=rpc        transport=gRPC
#   primitive/chassis/odom      mode=topic_out  transport=ROS2  nav_msgs/Odometry
#   primitive/chassis/twist_in  mode=topic_in   transport=ROS2  geometry_msgs/Twist  (we subscribe to /cmd_vel)
#   primitive/chassis/state     mode=rpc        transport=gRPC  GetRobotState (TODO)
#   primitive/chassis/move      mode=rpc        transport=gRPC  ExecuteMoveCommand (TODO)
#
# Config (passed via `Driver(CMD_INIT, config_json)`):
#   port_name        default "can_ranger"          — CAN interface
#   robot_model      default "ranger_mini_v2"
#   odom_frame       default "odom"
#   base_frame       default "base_link"
#   update_rate      default 50
#   odom_topic_name  default "odom"                — published topic
#   publish_odom_tf  default false                 — leave to soma's robot_state_publisher
#   sentinel_timeout_s default 30.0
manifestVersion: 1

package:
  name: com.robonix.ranger.chassis
  version: 0.1.0
  vendor: robonix
  description: AgileX Ranger Mini chassis driver wrapper.
  license: Apache-2.0

build: bash scripts/build.sh
start: bash scripts/start.sh

capabilities:
  - name: robonix/primitive/chassis/driver
  - name: robonix/primitive/chassis/odom
  - name: robonix/primitive/chassis/twist_in
